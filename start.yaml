session_name: unitree_mujoco
windows:
  - window_name: run
    layout: even-horizontal
    panes:
      - shell_command:
          - cd "${UNITREE_MUJOCO_ROOT}"
          - ./simulate/build.sh
          - cd simulate/build
          - ./unitree_mujoco -r "${UNITREE_ROBOT}" -s "${UNITREE_SCENE}"
      - shell_command:
          - cd "${UNITREE_MUJOCO_ROOT}"
          - ./agent/cpp/"${UNITREE_ROBOT}"/build.sh
          - cd agent/cpp/"${UNITREE_ROBOT}"/build
          - ./main
